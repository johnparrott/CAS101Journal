<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAS 101 Curiosity Journal</title>
<style>
:root{
  --ink:#111;
  --muted:#8d8d8d;
  --line:#dedede;
  --soft:#f4f4f4;
  --paper:#fff;
  --content:520px;
  --nav-height:64px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#fff}
button,input,textarea{font:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid #111;outline-offset:3px}
.hidden{display:none!important}
svg{display:block}
.app{min-height:100vh}
.topbar{
  height:var(--nav-height);min-height:var(--nav-height);border-bottom:1px solid #d9d9d9;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 34px;position:sticky;top:0;background:#fff;z-index:90
}
.top-left{display:flex;align-items:center;gap:12px}
.course{font-size:14px;font-weight:700;letter-spacing:.01em}
.course-home{border:0;background:transparent;padding:0;cursor:pointer;color:#111}
.course-home:hover{text-decoration:underline;text-underline-offset:3px}
.icon-btn{
  width:34px;height:34px;border:0;background:transparent;border-radius:50%;display:grid;place-items:center;color:#111
}
.icon-btn:hover{background:#f5f5f5}
.icon-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.save-top{
  min-width:92px;height:34px;border:0;border-radius:999px;background:#000;color:#fff;font-size:12px;font-weight:700
}
.toast{
  position:fixed;top:78px;left:50%;transform:translate(-50%,-10px);background:#111;color:#fff;
  padding:10px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.25s ease;z-index:100
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.scrim{
  position:fixed;
  inset:0;
  background:transparent;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
  z-index:70
}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;
  left:0;
  top:var(--nav-height);
  bottom:0;
  width:min(430px,88vw);
  background:#fff;
  z-index:80;
  transform:translateX(-102%);
  transition:transform .28s cubic-bezier(.22,.8,.22,1),box-shadow .28s ease;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
  box-shadow:18px 0 34px rgba(0,0,0,0)
}
.drawer.open{
  transform:translateX(0);
  box-shadow:18px 0 34px rgba(0,0,0,.12),6px 0 14px rgba(0,0,0,.06)
}
.drawer-body{padding:24px;overflow:auto}

.drawer-progress{
  margin-bottom:24px;
  padding-bottom:22px;
  border-bottom:1px solid #e6e6e6;
}
.drawer-progress-top{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:16px;
  margin-bottom:10px;
}
.drawer-progress-label{
  font-size:14px;
  font-weight:700;
  color:#111;
}
.drawer-progress-count{
  font-size:12px;
  color:#777;
  white-space:nowrap;
}
.drawer-progress-track{
  width:100%;
  height:8px;
  border-radius:999px;
  background:#ededed;
  overflow:hidden;
}
.drawer-progress-fill{
  height:100%;
  width:0;
  border-radius:inherit;
  background:#111;
  transition:width .5s cubic-bezier(.22,.8,.22,1);
}
.drawer-progress-note{
  margin-top:8px;
  font-size:12px;
  line-height:1.4;
  color:#8b8b8b;
}


.search-filter{
  border-bottom:1px solid #e3e3e3;
}
.search-filter-control{
  position:relative;
  display:grid;
  grid-template-columns:repeat(3,1fr);
}
.search-filter-btn{
  position:relative;
  min-height:42px;
  border:0;
  background:transparent;
  color:#777;
  font:inherit;
  font-size:12px;
  font-weight:650;
  cursor:pointer;
  padding:0 4px;
  transition:color .22s ease;
}
.search-filter-btn:hover,
.search-filter-btn:focus-visible{
  color:#111;
  outline:0;
}
.search-filter-btn.active{
  color:#111;
}
.search-filter-indicator{
  position:absolute;
  left:0;
  bottom:-1px;
  width:33.3333%;
  height:2px;
  background:#111;
  border-radius:999px;
  transform:translateX(calc(var(--filter-index,0) * 100%));
  transition:transform .32s cubic-bezier(.22,.8,.22,1);
}
.drawer-empty{
  padding:30px 18px;
  text-align:center;
  color:#888;
  font-size:13px;
  line-height:1.5;
}

.drawer-section{margin-bottom:26px}
.drawer-section h3{font-size:15px;margin:0 0 4px}
.drawer-section p{font-size:12px;color:#9d9d9d;margin:0 0 8px}
.drawer-item{
  width:100%;border:0;background:transparent;text-align:left;padding:10px 12px;border-radius:8px;
  display:grid;grid-template-columns:32px 1fr 10px;gap:8px;align-items:center
}
.drawer-item:hover,.drawer-item.current{background:#f4f4f4}
.drawer-num{font-weight:700;font-size:13px}
.drawer-title{font-size:13px;line-height:1.35}
.drawer-status{width:7px;height:7px;border-radius:50%;background:#ddd}
.drawer-status.progress{background:#777}
.drawer-status.complete{background:#111}

/* HOME */
.home{
  min-height:calc(100vh - var(--nav-height));
  padding:28px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.section-title{text-align:center;min-height:84px}
.section-title h1{margin:0 auto;font-size:31px;line-height:1.12;letter-spacing:-.035em;max-width:610px}
.section-title p{margin:8px 0 0;color:#8f8f8f;font-size:13px}
.carousel-shell{
  position:relative;
  width:min(100%,1080px);
  margin:28px auto 0;
  padding:0 72px;
  flex:0 0 auto;
}
.carousel{
  display:flex;
  align-items:center;
  gap:72px;
  overflow-x:auto;
  overflow-y:hidden;
  padding:34px calc(50% - 90px) 42px;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
  scrollbar-width:none;
  overscroll-behavior-x:contain;
  -webkit-overflow-scrolling:touch;
}
.carousel::-webkit-scrollbar{display:none}
.book-slot{
  position:relative;
  flex:0 0 180px;
  width:180px;
  height:270px;
  scroll-snap-align:center;
  scroll-snap-stop:always;
  opacity:.55;
  transform:scale(.94);
  transition:opacity .24s ease,transform .24s ease;
}
.book-slot.active{
  opacity:1;
  transform:scale(1);
}
.book{
  width:100%;height:100%;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.16);
  border-radius:2px 6px 6px 2px;background:#ddd;cursor:pointer;
  box-shadow:0 0 0 rgba(0,0,0,0);
  transition:box-shadow .28s ease
}
.home .book-slot.active .book{
  box-shadow:14px 18px 28px rgba(0,0,0,.16),5px 7px 10px rgba(0,0,0,.10)
}
.book::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:10px;
  background:linear-gradient(90deg,#111 0 3px,rgba(0,0,0,.25) 3px 6px,rgba(255,255,255,.35) 6px 8px,transparent 8px);
  z-index:2
}
.book:focus-visible{outline:3px solid #111;outline-offset:6px}
.edit-book{
  position:absolute;right:9px;top:9px;width:34px;height:34px;border:0;border-radius:50%;
  background:#111;color:#fff;display:grid;place-items:center;opacity:0;transform:scale(.9);transition:.2s ease;z-index:4
}
.book-slot.active:hover .edit-book,.book-slot.active .edit-book:focus-visible{opacity:1;transform:none}
.edit-book svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.carousel-side{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border:0;
  border-radius:50%;
  background:#f0f0f0;
  display:grid;
  place-items:center;
  z-index:3;
}
.carousel-side:hover{background:#e7e7e7}
.carousel-side.prev{left:12px}
.carousel-side.next{right:12px}
.carousel-side svg{width:18px;height:18px;fill:none;stroke:#111;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.meta{text-align:center;margin-top:2px}
.meta .chapter{font-size:18px;font-weight:750}
.meta .title{font-size:18px;color:#9d9d9d;margin-top:3px}
.dots{display:flex;justify-content:center;gap:7px;margin-top:28px}
.dot{width:6px;height:6px;border:0;border-radius:50%;padding:0;background:#d8d8d8}
.dot.active{background:#111}


/* Cover editor transition */
.book-slot.edit-exit-left{
  opacity:0!important;
  transform:translateX(-120vw) scale(.94)!important;
  transition:transform .28s cubic-bezier(.55,0,.8,.2),opacity .2s ease!important;
}
.book-slot.edit-exit-right{
  opacity:0!important;
  transform:translateX(120vw) scale(.94)!important;
  transition:transform .28s cubic-bezier(.55,0,.8,.2),opacity .2s ease!important;
}
.book-slot.edit-active{
  z-index:200!important;
  opacity:1!important;
  transform:scale(1)!important;
  transition:transform .28s cubic-bezier(.22,.8,.22,1),opacity .2s ease!important;
}
.book-slot.return-from-left{
  opacity:0;
  transform:translateX(-120vw) scale(.94);
}
.book-slot.return-from-right{
  opacity:0;
  transform:translateX(120vw) scale(.94);
}
.book-slot.return-active{
  opacity:1;
  transform:scale(1);
}

/* COVER EDIT */
.cover-edit{
  min-height:calc(100vh - var(--nav-height));
  padding:28px;
  position:relative;
}
.cover-edit h1{
  position:absolute;
  left:50%;
  top:50%;
  width:min(620px,calc(100% - 56px));
  transform:translate(-50%,-264px);
  font-size:31px;
  line-height:1.12;
  letter-spacing:-.035em;
  text-align:center;
  margin:0;
}
.edit-book-large{
  width:180px;
  height:270px;
  border:1px solid rgba(0,0,0,.16);
  border-radius:2px 6px 6px 2px;
  position:fixed;
  overflow:hidden;
  z-index:12;
}
.edit-book-large::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:10px;
  background:linear-gradient(90deg,#111 0 3px,rgba(0,0,0,.25) 3px 6px,rgba(255,255,255,.35) 6px 8px,transparent 8px)
}
.pattern-drawer{
  width:min(760px,94vw);
  min-height:112px;
  border:1px solid #d8d8d8;
  border-radius:24px;
  display:grid;
  grid-template-columns:92px 1fr 116px;
  align-items:center;
  background:#fff;
  padding:12px 16px;
  animation:slideUp .35s ease both;
  position:absolute;
  left:50%;
  bottom:22px;
  transform:translateX(-50%);
}
@keyframes slideUp{
  from{opacity:0;transform:translate(-50%,40px)}
  to{opacity:1;transform:translate(-50%,0)}
}
.pattern-drawer.closing{
  animation:slideDown .32s cubic-bezier(.55,0,.8,.2) both;
  pointer-events:none;
}
@keyframes slideDown{
  from{opacity:1;transform:translate(-50%,0)}
  to{opacity:0;transform:translate(-50%,46px)}
}
.pattern-arrows{display:flex;gap:8px;justify-content:center}
.small-round{width:36px;height:36px;border:0;border-radius:50%;background:#f0f0f0;display:grid;place-items:center}
.small-round svg{
  width:17px;
  height:17px;
  fill:none;
  stroke:#111;
  stroke-width:1.7;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.pattern-strip{
  display:flex;gap:8px;overflow-x:auto;padding:4px 10px;border-left:1px solid #ddd;border-right:1px solid #ddd;scrollbar-width:none
}
.pattern-strip::-webkit-scrollbar{display:none}
.pattern-thumb{flex:0 0 68px;width:68px;height:68px;border:3px solid transparent;border-radius:8px;padding:0;overflow:hidden;background:#eee}
.pattern-thumb.selected{border-color:#111}
.pattern-thumb span{
  display:block;
  width:180px;
  height:180px;
  transform:scale(.37778);
  transform-origin:top left;
}
.edit-actions{padding-left:15px;display:grid;gap:8px}
.edit-actions button{
  height:34px;border:0;border-radius:999px;font-size:17px;font-weight:700;
  display:grid;place-items:center;
}
.edit-actions button svg{
  width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;
  stroke-linecap:round;stroke-linejoin:round;
}
.cancel-edit{background:#eee;color:#111}
.save-edit{background:#000;color:#fff}



/* Instructions content arrival and exit */
.instructions-pane.opening-with-book{
  opacity:0;
  transform:translateY(22px);
  animation:instructionsContentIn .48s cubic-bezier(.22,.8,.22,1) .12s forwards;
}
.instructions-pane.instructions-leaving{
  animation:instructionsContentOut .26s cubic-bezier(.55,0,.8,.2) forwards;
  pointer-events:none;
}
.instructions-pane.opening-with-book .instructions > *{
  opacity:0;
  transform:translateY(12px);
  animation:instructionItemIn .42s cubic-bezier(.22,.8,.22,1) forwards;
}
.instructions-pane.opening-with-book .instructions > *:nth-child(1){animation-delay:.18s}
.instructions-pane.opening-with-book .instructions > *:nth-child(2){animation-delay:.24s}
.instructions-pane.opening-with-book .instructions > *:nth-child(3){animation-delay:.30s}
.instructions-pane.opening-with-book .instructions > *:nth-child(4){animation-delay:.36s}

@keyframes instructionsContentIn{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes instructionItemIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes instructionsContentOut{
  from{opacity:1;transform:translateY(0)}
  to{opacity:0;transform:translateY(18px)}
}


.journal-transition-meta{
  position:fixed;
  z-index:121;
  pointer-events:none;
  text-align:center;
  will-change:left,top,width,transform,opacity;
}
.journal-transition-meta .chapter{
  font-size:18px;
  font-weight:750;
  line-height:1.2;
  color:#111;
  white-space:nowrap;
}
.journal-transition-meta .title{
  font-size:18px;
  line-height:1.25;
  color:#9d9d9d;
  margin-top:3px;
  white-space:nowrap;
}
.journal-title-copy.is-hidden{
  opacity:0;
}

/* Journal cover transition */
.journal-head{
  grid-template-columns:70px minmax(0,1fr) 70px;
  align-items:center;
}
.journal-title-group{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  min-width:0;
}
.journal-cover-mini{
  width:58px;
  height:87px;
  flex:0 0 58px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(0,0,0,.16);
  border-radius:2px 4px 4px 2px;
}
.journal-cover-pattern{
  position:absolute;
  left:0;
  top:0;
  width:180px;
  height:270px;
  transform-origin:top left;
  transform:scale(.322222,.322222);
}
.journal-cover-mini::before,
.journal-transition-book::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:6px;
  background:linear-gradient(90deg,#111 0 2px,rgba(0,0,0,.25) 2px 4px,rgba(255,255,255,.35) 4px 5px,transparent 5px);
  z-index:3;
}
.journal-title-copy{
  min-width:0;
  text-align:left;
}
.journal-transition-book{
  position:fixed;
  z-index:120;
  pointer-events:none;
  overflow:hidden;
  border:1px solid rgba(0,0,0,.16);
  border-radius:2px 6px 6px 2px;
  will-change:left,top,width,height,opacity;
}
.journal-transition-pattern{
  position:absolute;
  left:0;
  top:0;
  transform-origin:top left;
  will-change:transform;
}
.journal-cover-mini.is-hidden,
.book.transition-target-hidden{
  opacity:0!important;
}
@media(max-width:760px){
  .journal-title-group{gap:14px}
  .journal-cover-mini{width:48px;height:72px;flex-basis:48px}
  .journal-cover-pattern{transform:scale(.266667,.266667)}
  .journal-title-copy h1{font-size:18px}
  .journal-title-copy p{font-size:15px}
}

/* JOURNAL */
.journal-page{
  min-height:calc(100vh - var(--nav-height));
}
.journal-wrap{
  width:min(100%,820px);
  min-height:calc(100vh - var(--nav-height));
  margin:0 auto;
  padding:64px 28px 42px;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
}
.journal-head{
  display:grid;
  grid-template-columns:70px 1fr 70px;
  align-items:start;
}
.journal-head-center h1{font-size:22px;margin:0}
.journal-head-center p{font-size:20px;color:#9d9d9d;margin:3px 0 0}
.journal-back,.info-btn{margin-top:-7px}
.journal-divider{
  border:0;
  border-top:1px solid #d8d8d8;
  margin:40px 70px 0;
}
.journal-content-stage{
  position:relative;
  min-height:0;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.journal-content{
  width:100%;
  will-change:transform,opacity;
}
.journal-content.instructions-pane{
  max-width:590px;
  margin:0 auto;
  padding:42px 0 56px;
}
.instructions{max-width:590px;margin:0 auto}
.instructions p,.instructions li{font-size:17px;line-height:1.45}
.instructions ul{padding-left:22px}
.instructions li{margin:18px 0}
.instructions-next{display:flex;justify-content:flex-end;margin-top:42px}

.journal-content.enter-forward{animation:journalEnterForward .34s cubic-bezier(.22,.8,.22,1) both}
.journal-content.enter-back{animation:journalEnterBack .34s cubic-bezier(.22,.8,.22,1) both}
.journal-content.exit-forward{animation:journalExitForward .22s ease both}
.journal-content.exit-back{animation:journalExitBack .22s ease both}

@keyframes journalEnterForward{
  from{opacity:0;transform:translateX(64px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes journalEnterBack{
  from{opacity:0;transform:translateX(-64px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes journalExitForward{
  from{opacity:1;transform:translateX(0)}
  to{opacity:0;transform:translateX(-64px)}
}
@keyframes journalExitBack{
  from{opacity:1;transform:translateX(0)}
  to{opacity:0;transform:translateX(64px)}
}
.next-pill{
  width:116px;
  height:36px;
  border:0;
  border-radius:999px;
  background:#000;
  color:#fff;
  display:grid;
  place-items:center;
}
.next-pill svg{
  width:18px;
  height:18px;
  fill:none;
  stroke:currentColor;
  stroke-width:1.7;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* Stagger the entry sections while preserving the existing page slide */
.entry-wrap.enter-forward .entry-section,
.entry-wrap.enter-back .entry-section{
  opacity:0;
  will-change:transform,opacity;
}
.entry-wrap.enter-forward .entry-section{
  animation:entrySectionInForward .38s cubic-bezier(.22,.8,.22,1) forwards;
}
.entry-wrap.enter-back .entry-section{
  animation:entrySectionInBack .38s cubic-bezier(.22,.8,.22,1) forwards;
}
.entry-wrap.enter-forward .entry-section:nth-child(1),
.entry-wrap.enter-back .entry-section:nth-child(1){
  animation-delay:.05s;
}
.entry-wrap.enter-forward .entry-section:nth-child(2),
.entry-wrap.enter-back .entry-section:nth-child(2){
  animation-delay:.12s;
}
.entry-wrap.enter-forward .entry-section:nth-child(3),
.entry-wrap.enter-back .entry-section:nth-child(3){
  animation-delay:.19s;
}
@keyframes entrySectionInForward{
  from{opacity:0;transform:translateX(34px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes entrySectionInBack{
  from{opacity:0;transform:translateX(-34px)}
  to{opacity:1;transform:translateX(0)}
}

.entry-wrap{
  width:min(100%,720px);
  margin:0 auto;
  padding:36px 0 80px;
}
.entry-section:first-child{padding-top:0}
.entry-section{display:grid;grid-template-columns:34px 1fr;gap:14px;padding:36px 0;border-bottom:1px solid #ddd}
.step-check{
  width:22px;height:22px;border-radius:50%;background:#ddd;color:#fff;display:grid;place-items:center;font-size:12px;margin-top:2px
}
.step-check.done{background:#111}
.entry-section h2{font-size:16px;margin:0 0 14px}
.entry-help{font-size:14px;line-height:1.5;color:#8f8f8f;margin:0 0 16px}
.field{width:100%;border:1px solid #ccc;border-radius:4px;padding:14px;font-size:15px;line-height:1.45;resize:vertical}
.question-field{min-height:96px}
.answer-field{min-height:280px}
.add-source{height:34px;padding:0 14px;border:1px solid #111;border-radius:999px;background:#fff;font-size:13px;font-weight:650}
.source-list{display:grid;gap:12px;margin-top:16px}
.source-card{border:1px solid #ccc;border-radius:7px;padding:16px}
.source-top{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center}
.favicon{
  width:42px;
  height:42px;

/* MODALS */
.modal-layer{
  position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:90;display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
  transition:opacity .24s ease,visibility 0s linear .24s
}
.modal-layer.open{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transition:opacity .24s ease,visibility 0s linear 0s
}
.modal{
  width:min(520px,96vw);background:#fff;border-radius:14px;padding:32px;position:relative;max-height:88vh;overflow:auto;
  opacity:0;
  transform:translateY(18px) scale(.975);
  transform-origin:center center;
  transition:transform .34s cubic-bezier(.22,.8,.22,1),opacity .22s ease
}
.modal-layer.open .modal{
  opacity:1;
  transform:translateY(0) scale(1)
}
.modal-layer.closing{
  visibility:visible;
  pointer-events:none;
  animation:modalBackdropOut .36s ease forwards
}
.modal-layer.closing .modal{
  animation:modalPanelOut .32s cubic-bezier(.55,0,.8,.2) forwards
}
@keyframes modalPanelOut{
  0%{
    opacity:1;
    transform:translateY(0) scale(1)
  }
  100%{
    opacity:0;
    transform:translateY(24px) scale(.965)
  }
}
@keyframes modalBackdropOut{
  0%,38%{opacity:1}
  100%{opacity:0}
}
@media (prefers-reduced-motion:reduce){
  .modal-layer,.modal{transition:none!important}
}
.modal-close{

}

  0%{
    opacity:0;
    transform:translate(-50%,-50%) rotate(0deg) scale(.7);
  }
  12%{opacity:1}
  100%{

    transform:
      translate(
        calc(-50% + var(--confetti-x,0px)),

      )
      rotate(var(--confetti-r,180deg))
      scale(1);

/* Edit action animations */
.edit-actions{
  position:relative;
}
.edit-actions button{
  overflow:hidden;
  position:relative;
}
.edit-actions button svg{
  width:18px;
  height:18px;

.action-draw .draw-stroke{
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-dasharray:24;
  stroke-dashoffset:0;
}
.action-draw:hover .draw-stroke,
.action-draw:focus-visible .draw-stroke{
  animation:drawIcon .46s cubic-bezier(.22,.8,.22,1) both;
}
.action-draw:hover .draw-delay,
.action-draw:focus-visible .draw-delay{
  animation-delay:.09s;
}
@keyframes drawIcon{
  0%{stroke-dashoffset:24;opacity:.35}
  100%{stroke-dashoffset:0;opacity:1}
}

.save-edit.saving{
  animation:savePulse .56s cubic-bezier(.22,.8,.22,1) both;
  pointer-events:none;
}
.save-edit.saving svg{
  animation:saveCheckPop .56s cubic-bezier(.22,.8,.22,1) both;
}
.save-edit.saving::after{
  content:"";
  position:absolute;
  inset:50% auto auto 50%;
  width:8px;
  height:8px;
  border-radius:50%;
  background:rgba(255,255,255,.85);
  transform:translate(-50%,-50%) scale(0);
  animation:saveRipple .56s ease-out both;
}
.pattern-drawer.save-confirmed{
  animation:panelConfirm .46s cubic-bezier(.22,.8,.22,1) both;
}
@keyframes savePulse{
  0%{transform:scale(1)}
  38%{transform:scale(.88)}
  72%{transform:scale(1.08)}
  100%{transform:scale(1)}
}
@keyframes saveCheckPop{
  0%{transform:scale(1)}
  45%{transform:scale(.72)}
  75%{transform:scale(1.22)}
  100%{transform:scale(1)}
}
@keyframes saveRipple{
  0%{opacity:.8;transform:translate(-50%,-50%) scale(0)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(7)}
}
@keyframes panelConfirm{
  0%{transform:translate(-50%,0);box-shadow:0 0 0 0 rgba(0,0,0,0)}
  45%{transform:translate(-50%,-3px);box-shadow:0 10px 28px rgba(0,0,0,.12)}
  100%{transform:translate(-50%,0);box-shadow:0 0 0 0 rgba(0,0,0,0)}
}

.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.search-nav-btn{
  transition:transform .2s ease,background-color .2s ease;
}
.search-nav-btn:hover,
.search-nav-btn:focus-visible{
  transform:scale(1.06);
  background:#f3f3f3;
}
.search-modal{
  width:min(680px,calc(100vw - 32px));
  max-height:min(720px,calc(100vh - 48px));
  padding:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.search-head{
  padding:20px 22px 16px;
  border-bottom:1px solid #e2e2e2;
}
.search-title-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.search-title-row h2{
  margin:0;
  font-size:20px;
}
.search-box{
  height:48px;
  border:1px solid #cfcfcf;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 14px;
  transition:border-color .18s ease,box-shadow .18s ease;
}
.search-box:focus-within{
  border-color:#111;
  box-shadow:0 0 0 3px rgba(0,0,0,.06);
}
.search-box svg{
  width:19px;
  height:19px;
  fill:none;
  stroke:currentColor;
  stroke-width:1.8;
  flex:0 0 auto;
}
.search-box input{
  width:100%;
  border:0;
  outline:0;
  background:transparent;
  font:inherit;
  font-size:16px;
}
.search-results{
  padding:10px;
  overflow:auto;
}
.search-empty{
  min-height:220px;
  display:grid;
  place-items:center;
  padding:30px;
  text-align:center;
  color:#777;
  line-height:1.5;
}
.search-result{
  width:100%;
  border:0;
  background:transparent;
  border-radius:14px;
  padding:14px;
  text-align:left;
  display:grid;
  grid-template-columns:42px minmax(0,1fr) auto;
  gap:12px;
  align-items:start;
  cursor:pointer;
  transition:background-color .18s ease,transform .18s ease;
}
.search-result:hover,
.search-result:focus-visible{
  background:#f4f4f4;
  transform:translateX(2px);
  outline:0;
}
.search-result-num{
  width:38px;
  height:38px;
  border:1px solid #d7d7d7;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:13px;
  font-weight:750;
}
.search-result-copy{
  min-width:0;
}
.search-result-title{
  font-size:15px;
  font-weight:700;
  line-height:1.35;
}
.search-result-match{
  margin-top:4px;
  color:#666;
  font-size:13px;
  line-height:1.45;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}
.search-result-status{
  margin-top:10px;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#ddd;
}
.search-result-status.progress{background:#777}
.search-result-status.complete{background:#111}
.search-hint{
  margin-top:10px;
  font-size:12px;
  color:#999;
}
.search-count{
  padding:4px 14px 8px;
  font-size:12px;
  color:#888;
}
.search-result mark{
  background:#e8e8e8;
  color:inherit;
  border-radius:3px;
  padding:0 2px;
}
@media(max-width:640px){
  .search-modal{max-height:calc(100vh - 20px)}
  .search-head{padding:16px}
  .search-result{grid-template-columns:38px minmax(0,1fr) auto;padding:12px 10px}
}

.nav-search{position:relative;display:flex;align-items:center}
.nav-search-pill{
  width:0;height:40px;opacity:0;overflow:hidden;display:flex;align-items:center;gap:9px;
  background:#efefef;border-radius:999px;pointer-events:none;
  transform:translateX(8px) scale(.96);transform-origin:right center;
  transition:width .34s cubic-bezier(.22,.8,.22,1),opacity .2s ease,transform .34s cubic-bezier(.22,.8,.22,1),padding .34s cubic-bezier(.22,.8,.22,1)
}
.nav-search.open .search-nav-btn{
  width:0;min-width:0;opacity:0;pointer-events:none;padding:0;margin:0;transform:scale(.8)
}
.nav-search.open .nav-search-pill{
  width:min(360px,42vw);opacity:1;pointer-events:auto;transform:translateX(0) scale(1);padding:0 8px 0 14px
}
.nav-search-icon{
  width:18px;height:18px;flex:0 0 auto;fill:none;stroke:currentColor;stroke-width:1.8;color:#666
}
.nav-search-pill input{
  min-width:0;width:100%;border:0;outline:0;background:transparent;font:inherit;font-size:14px;color:#111
}
.nav-search-pill input::placeholder{color:#888}
.nav-search-close{
  width:28px;height:28px;flex:0 0 28px;border:0;border-radius:50%;background:transparent;
  display:grid;place-items:center;cursor:pointer;color:#666;
  transition:background-color .18s ease,color .18s ease,transform .18s ease
}
.nav-search-close:hover,.nav-search-close:focus-visible{background:#ddd;color:#111;transform:scale(1.05);outline:0}
.nav-search-close svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.search-nav-btn{transition:width .28s ease,min-width .28s ease,opacity .2s ease,transform .2s ease,background-color .2s ease,padding .2s ease,margin .2s ease}
.nav-search-results{
  position:fixed;top:var(--nav-height);left:0;right:0;z-index:35;
  max-height:min(520px,calc(100vh - var(--nav-height) - 24px));overflow:auto;
  background:rgba(255,255,255,.97);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-bottom:1px solid #dedede;box-shadow:0 18px 34px rgba(0,0,0,.08);
  opacity:0;transform:translateY(-12px);pointer-events:none;
  transition:opacity .22s ease,transform .28s cubic-bezier(.22,.8,.22,1)
}
.nav-search-results.open{opacity:1;transform:translateY(0);pointer-events:auto}
.nav-search-results-inner{width:min(720px,calc(100% - 32px));margin:0 auto;padding:12px 0 18px}
.nav-search-results .search-empty{min-height:140px}

.landing{

<script>
(()=>{
const SECTIONS=[
{id:"intro",name:"Intro: How to Think Like a Developmentalist",age:""},
{id:"prenatal",name:"Prenatal Development",age:"Conception through birth"},
{id:"infancy",name:"Infancy & Toddlerhood",age:"Birth through two years"},
{id:"early",name:"Early Childhood",age:"Ages two through six"},
{id:"middle",name:"Middle Childhood",age:"Ages six through eleven"},
{id:"adolescence",name:"Adolescence",age:"Approximately ages eleven through eighteen"}
];
const JOURNALS=[
{id:"ch1",section:"intro",chapter:1,title:"Introduction to Child Development",pattern:1},
{id:"ch2",section:"prenatal",chapter:2,title:"Conception, Heredity, & Prenatal Development",pattern:2},
{id:"ch3",section:"prenatal",chapter:3,title:"Birth and the Newborn",pattern:3},
{id:"ch4",section:"infancy",chapter:4,title:"Physical Development in Infancy & Toddlerhood",pattern:4},
{id:"ch5",section:"infancy",chapter:5,title:"Cognitive Development in Infancy & Toddlerhood",pattern:5},
{id:"ch6",section:"infancy",chapter:6,title:"Social and Emotional Development in Infancy & Toddlerhood",pattern:6},
{id:"ch7",section:"early",chapter:7,title:"Physical Development in Early Childhood",pattern:7},
{id:"ch8",section:"early",chapter:8,title:"Cognitive Development in Early Childhood",pattern:8},
{id:"ch9",section:"early",chapter:9,title:"Social and Emotional Development in Early Childhood",pattern:9},
{id:"ch10",section:"middle",chapter:10,title:"Physical Development in Middle Childhood",pattern:10},
{id:"ch11",section:"middle",chapter:11,title:"Cognitive Development in Middle Childhood",pattern:11},
{id:"ch12",section:"middle",chapter:12,title:"Social and Emotional Development in Middle Childhood",pattern:12},
{id:"ch13",section:"adolescence",chapter:13,title:"Physical Development in Adolescence",pattern:13},
{id:"ch14",section:"adolescence",chapter:14,title:"Cognitive Development in Adolescence",pattern:14},
{id:"ch15",section:"adolescence",chapter:15,title:"Social and Emotional Development in Adolescence",pattern:15}
];
const URL_PARAMS=new URLSearchParams(window.location.search);
const DEMO_MODE=URL_PARAMS.get("demo")==="1";
const STATIC_DEMO=URL_PARAMS.get("static")==="home";
const STORAGE=DEMO_MODE?"cas101-curiosity-journal-demo-v1":"cas101-curiosity-journal-v1";

const OFFICIAL_PATTERN_SOURCE="https://raw.githubusercontent.com/Afif13/CSS-Pattern/main/index.html";
let availablePatternNumbers=Array.from({length:30},(_,index)=>index+1);

async function loadOfficialPatterns(){
  try{
    const response=await fetch(OFFICIAL_PATTERN_SOURCE,{cache:"force-cache"});
    if(!response.ok)throw new Error("Pattern source unavailable");

    const source=await response.text();
    const parser=new DOMParser();
    const doc=parser.parseFromString(source,"text/html");
    const css=[];
    const discovered=[];

    [...doc.querySelectorAll('[id^="g"]')].forEach(section=>{
      const match=section.id.match(/^g(\d+)$/);
      if(!match)return;

      const number=Number(match[1]);
      const sourceStyle=section.querySelector("style")?.textContent;
      if(!sourceStyle)return;

      const convertedStyle=sourceStyle.replace(
        new RegExp(`#g${number}(?=\\s*[,{])`,"g"),
        `.pattern-${number}`
      );

      css.push(convertedStyle);
      discovered.push(number);
    });

    if(css.length){
      document.getElementById("official-css-patterns")?.remove();

      const style=document.createElement("style");
      style.id="official-css-patterns";
      style.textContent=css.join("\n");
      document.head.appendChild(style);

      availablePatternNumbers=[...new Set(discovered)].sort((a,b)=>a-b);
    }
  }catch(error){
    console.warn("Using bundled pattern fallbacks.",error);
  }
}

const emptyJournal=()=>({introSeen:false,question:"",sources:[],answer:"",complete:false,updatedAt:null});
const defaultState={
  view:"home",
  currentIndex:0,
  studentName:"",
  studentFirstName:"",
  studentLastName:"",
  auth:{loggedIn:false,provider:"",email:"",displayName:""},
  patterns:Object.fromEntries(JOURNALS.map(j=>[j.id,j.pattern])),
  journals:Object.fromEntries(JOURNALS.map(j=>[j.id,emptyJournal()]))
};
let state=load();
let drag=null;
let draftPattern=null;
let journalTransition="none";
let coverTransition="none";

let editClosing=false;

let journalBookAnimating=false;

function load(){
  try{
    const p=JSON.parse(localStorage.getItem(STORAGE)||"null");
    if(!p)return structuredClone(defaultState);
    const s=structuredClone(defaultState);
    Object.assign(s,p);
    s.auth={...defaultState.auth,...(p.auth||{})};
    JOURNALS.forEach(j=>{
      s.journals[j.id]={...emptyJournal(),...(p.journals?.[j.id]||{})};
      s.patterns[j.id]=p.patterns?.[j.id]||j.pattern;
    });
    return s;
  }catch{return structuredClone(defaultState)}
}
function save(){
  localStorage.setItem(STORAGE,JSON.stringify(state));
}
function touch(js){js.updatedAt=Date.now();js.complete=false;save()}
function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function escAttr(s=""){return esc(s)}
function currentJournal(){return JOURNALS[state.currentIndex]}
function currentJS(){return state.journals[currentJournal().id]}
function sectionFor(id){return SECTIONS.find(s=>s.id===id)}
function status(js){if(js.complete)return"complete";if(js.question||js.answer||js.sources.length)return"progress";return"new"}
function showToast(msg="Your progress has been saved."){
  toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1800)
}

function isLoggedIn(){
  return Boolean(state.auth?.loggedIn);
}

function profileInitials(name="Student"){
  const parts=name.trim().split(/\s+/).filter(Boolean);
  if(!parts.length)return"S";
  if(parts.length===1)return parts[0].slice(0,1).toUpperCase();
  return `${parts[0][0]}${parts[parts.length-1][0]}`.toUpperCase();
}

function closeProfileMenu(){
  profileMenu.classList.remove("open");
  profileMenu.setAttribute("aria-hidden","true");
  profileButton.setAttribute("aria-expanded","false");
}

function openProfileMenu(){
  if(!isLoggedIn())return;
  profileMenu.classList.add("open");
  profileMenu.setAttribute("aria-hidden","false");
  profileButton.setAttribute("aria-expanded","true");
}

function updateProfileUI(){
  const name=state.auth?.displayName||[state.studentFirstName,state.studentLastName].filter(Boolean).join(" ")||"Student";
  const email=state.auth?.email||"";
  const initials=profileInitials(name);

  profileAvatar.textContent=initials;
  profileMenuAvatar.textContent=initials;
  profileMenuName.textContent=name;
  profileMenuEmail.textContent=email;
  profileMenuEmail.classList.toggle("hidden",!email);
}

function applyAuthShell(){
  document.body.classList.toggle("logged-in",isLoggedIn());
  document.body.classList.toggle("logged-out",!isLoggedIn());
  closeNavSearch();
  closeDrawer();
  closeProfileMenu();
  updateProfileUI();
  if(!isLoggedIn()){
    saveTop.classList.add("hidden");
  }
}

function nameFromEmail(email=""){
  const local=(email.split("@")[0]||"student").replace(/[._-]+/g," ").trim();
  return local.replace(/\b\w/g,m=>m.toUpperCase())||"Student";
}

function splitNameParts(displayName="Student"){
  const clean=displayName.trim().replace(/\s+/g," ");
  const parts=clean.split(" ");
  return {
    first:parts[0]||"Student",
    last:parts.length>1?parts.slice(1).join(" "):""
  };
}

function completeLocalLogin({provider,email,displayName}){
  const name=displayName?.trim()||nameFromEmail(email)||"Student";
  const parts=splitNameParts(name);
  state.auth={loggedIn:true,provider,email:email||"",displayName:name};
  if(!state.studentFirstName)state.studentFirstName=parts.first;
  if(!state.studentLastName && parts.last)state.studentLastName=parts.last;
  state.view="home";
  save();
  closeModal();
  applyAuthShell();
  render();
  window.scrollTo(0,0);
}

function signOutLocal(){
  state.auth={...defaultState.auth};
  state.view="home";
  save();
  closeProfileMenu();
  closeDrawer();
  closeNavSearch();
  closeModal();
  applyAuthShell();
  window.scrollTo(0,0);
}

function openAuthModal(){

        <path fill="#4A90E2" d="M12.24 22.154c2.55 0 4.693-.844 6.257-2.3l-2.89-2.38c-.774.542-1.804.922-3.367.922-3.573 0-5.235-2.92-5.432-4.405l-3.116 2.4c1.485 2.952 4.58 5.763 8.548 5.763Z"/>
        <path fill="#FBBC05" d="M6.808 13.99a6.703 6.703 0 0 1-.316-2.035c0-.706.115-1.389.301-2.035L3.677 7.52A9.699 9.699 0 0 0 3.06 12.577c0 1.77.43 3.444 1.186 4.924l2.562-1.983Z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="auth-divider">or</div>

    <div class="auth-stack">

    <div class="auth-footnote">For local testing only, both options create a session in this browser without contacting a real auth provider.</div>`;

  openModal();

  const emailInput=document.getElementById("authEmail");

  };

  emailInput.addEventListener("input",syncEmailButton);
  passwordInput.addEventListener("input",syncEmailButton);
  syncEmailButton();

  document.getElementById("continueWithGoogle").onclick=()=>{
    completeLocalLogin({
      provider:"google",
      email:"student@example.com",
      displayName:state.auth?.displayName||"Student"
    });

function renderHome(){
  const j=currentJournal(),sec=sectionFor(j.section);
  main.innerHTML=`<section class="home">
    <div class="section-title"><h1>${esc(sec.name)}</h1></div>
    <div class="carousel-shell">
      <button class="carousel-side prev" id="carouselPrev" aria-label="Previous journal">
        <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"></path></svg>
      </button>
      <div class="carousel" id="carousel" tabindex="0" aria-label="Journal carousel">
        ${JOURNALS.map((x,i)=>{
          let transitionClass="";
          if(coverTransition==="return"){
            transitionClass=i<state.currentIndex?"return-from-left":i>state.currentIndex?"return-from-right":"return-active";
          }
          return `<div class="book-slot ${i===state.currentIndex?"active":""} ${transitionClass}" data-index="${i}">
            <div class="book pattern-${state.patterns[x.id]}" tabindex="0" role="button" aria-label="Open Chapter ${x.chapter}: ${esc(x.title)}">
              <button class="edit-book" data-edit="${i}" aria-label="Edit cover pattern">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-4-4L4 16v4zM13.5 6.5l4 4"></path></svg>
              </button>
            </div>
          </div>`;
        }).join("")}
      </div>
      <button class="carousel-side next" id="carouselNext" aria-label="Next journal">
        <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
      </button>
    </div>
    <div class="meta"><div class="chapter">Chapter ${j.chapter}</div><div class="title">${esc(j.title)}</div>
      <div class="dots">${JOURNALS.map((_,i)=>`<button class="dot ${i===state.currentIndex?"active":""}" data-dot="${i}" aria-label="Go to journal ${i+1}"></button>`).join("")}</div>
    </div>
  </section>`;

  const c=document.getElementById("carousel");
  const slots=[...c.querySelectorAll(".book-slot")];

  const setActive=(idx,shouldScroll=false)=>{
    idx=Math.max(0,Math.min(JOURNALS.length-1,idx));
    state.currentIndex=idx;
    slots.forEach((slot,i)=>slot.classList.toggle("active",i===idx));
    const activeJournal=JOURNALS[idx];
    const activeSection=sectionFor(activeJournal.section);
    document.querySelector(".section-title").innerHTML=
      `<h1>${esc(activeSection.name)}</h1>`;
    document.querySelector(".meta .chapter").textContent=`Chapter ${activeJournal.chapter}`;
    document.querySelector(".meta .title").textContent=activeJournal.title;
    document.querySelectorAll(".dot").forEach((dot,i)=>dot.classList.toggle("active",i===idx));
    if(shouldScroll)slots[idx].scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
    const prevBtn=document.getElementById("carouselPrev");
    const nextBtn=document.getElementById("carouselNext");
    if(prevBtn)prevBtn.disabled=idx===0;
    if(nextBtn)nextBtn.disabled=idx===JOURNALS.length-1;
    save();
  };

  slots.forEach((slot,idx)=>{
    const book=slot.querySelector(".book");
    book.onclick=e=>{
      if(e.target.closest(".edit-book"))return;
      openJournal(idx,book);
    };
    book.onkeydown=e=>{
      if(e.key==="Enter"||e.key===" "){
        e.preventDefault();
        openJournal(idx,book);
      }
    };
  });

  c.querySelectorAll("[data-edit]").forEach(btn=>btn.onclick=e=>{
    e.stopPropagation();
    const index=+btn.dataset.edit;
    state.currentIndex=index;
    draftPattern=state.patterns[currentJournal().id];

    btn.classList.add("edit-opening");

    const selectedBook=slots[index].querySelector(".book");
    const rect=selectedBook.getBoundingClientRect();
    editBookRect={left:rect.left,top:rect.top,width:rect.width,height:rect.height};

    setTimeout(()=>{
      slots.forEach((slot,i)=>{
        slot.classList.remove("return-from-left","return-from-right","return-active");
        if(i<index)slot.classList.add("edit-exit-left");
        else if(i>index)slot.classList.add("edit-exit-right");
        else slot.classList.add("edit-active");
      });

      setTimeout(()=>{
        coverTransition="none";
        state.view="edit";
        render();
      },260);
    },180);
  });

  const homePrev=document.getElementById("carouselPrev");
  const homeNext=document.getElementById("carouselNext");
  homePrev.onclick=()=>setActive(state.currentIndex-1,true);
  homeNext.onclick=()=>setActive(state.currentIndex+1,true);
  homePrev.disabled=state.currentIndex===0;
  homeNext.disabled=state.currentIndex===JOURNALS.length-1;

  c.onkeydown=e=>{
    if(e.key==="ArrowLeft"){e.preventDefault();setActive(state.currentIndex-1,true)}
    if(e.key==="ArrowRight"){e.preventDefault();setActive(state.currentIndex+1,true)}
    if(e.key==="Enter")openJournal(state.currentIndex)
  };

  main.querySelectorAll("[data-dot]").forEach(b=>b.onclick=()=>setActive(+b.dataset.dot,true));

  let scrollTimer;
  let settling=false;

  const settleNearestBook=()=>{
    const center=c.scrollLeft+c.clientWidth/2;
    let nearest=0,nearestDistance=Infinity;
    slots.forEach((slot,i)=>{
      const slotCenter=slot.offsetLeft+slot.offsetWidth/2;
      const distance=Math.abs(slotCenter-center);
      if(distance<nearestDistance){nearest=i;nearestDistance=distance}
    });

    setActive(nearest,false);

    const target=slots[nearest];
    const targetLeft=target.offsetLeft-(c.clientWidth-target.offsetWidth)/2;
    if(Math.abs(c.scrollLeft-targetLeft)>2){
      settling=true;
      c.scrollTo({left:targetLeft,behavior:"smooth"});
      setTimeout(()=>settling=false,360);
    }
  };

  c.addEventListener("scroll",()=>{
    clearTimeout(scrollTimer);
    scrollTimer=setTimeout(()=>{
      if(!settling)settleNearestBook();
    },110);
  });

  if("onscrollend" in c){
    c.addEventListener("scrollend",()=>{
      if(!settling)settleNearestBook();
    });
  }

  requestAnimationFrame(()=>{
    slots[state.currentIndex].scrollIntoView({inline:"center",block:"nearest"});
    if(coverTransition==="return"){
      requestAnimationFrame(()=>{
        slots.forEach(slot=>slot.classList.remove("return-from-left","return-from-right","return-active"));
        coverTransition="none";
      });
    }
  });
}


function createJournalTransitionMeta(rect,chapter,title){
  const el=document.createElement("div");
  el.className="journal-transition-meta";
  el.innerHTML=`<div class="chapter">Chapter ${chapter}</div><div class="title">${esc(title)}</div>`;
  Object.assign(el.style,{
    left:`${rect.left}px`,
    top:`${rect.top}px`,
    width:`${rect.width}px`
  });
  document.body.appendChild(el);
  return el;
}

function createJournalTransitionBook(pattern,rect){
  const el=document.createElement("div");
  el.className="journal-transition-book";

  const inner=document.createElement("div");
  inner.className=`journal-transition-pattern pattern-${pattern}`;
  inner.style.width=`${rect.width}px`;
  inner.style.height=`${rect.height}px`;
  inner.style.transform="scale(1,1)";
  el.appendChild(inner);

  Object.assign(el.style,{
    left:`${rect.left}px`,
    top:`${rect.top}px`,
    width:`${rect.width}px`,
    height:`${rect.height}px`
  });
  document.body.appendChild(el);
  return el;
}

function animateBookToJournal(){
  if(!journalOpenRect)return;
  const target=document.querySelector(".journal-cover-mini");
  const titleTarget=document.querySelector(".journal-title-copy");
  if(!target||!titleTarget)return;

  target.classList.add("is-hidden");
  titleTarget.classList.add("is-hidden");

  const targetRect=target.getBoundingClientRect();
  const titleRect=titleTarget.getBoundingClientRect();
  const j=currentJournal();

  const bookClone=createJournalTransitionBook(state.patterns[j.id],journalOpenRect);
  const bookInner=bookClone.querySelector(".journal-transition-pattern");
  const metaClone=journalMetaRect?createJournalTransitionMeta(journalMetaRect,j.chapter,j.title):null;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const transition="left .48s cubic-bezier(.22,.8,.22,1), top .48s cubic-bezier(.22,.8,.22,1), width .48s cubic-bezier(.22,.8,.22,1), height .48s cubic-bezier(.22,.8,.22,1), border-radius .48s ease, opacity .12s ease";
    bookClone.style.transition=transition;
    bookInner.style.transition="transform .48s cubic-bezier(.22,.8,.22,1)";
    bookClone.style.left=`${targetRect.left}px`;
    bookClone.style.top=`${targetRect.top}px`;
    bookClone.style.width=`${targetRect.width}px`;
    bookClone.style.height=`${targetRect.height}px`;
    bookClone.style.borderRadius="2px 4px 4px 2px";
    bookInner.style.transform=`scale(${targetRect.width/journalOpenRect.width},${targetRect.height/journalOpenRect.height})`;

    if(metaClone){
      metaClone.style.transition="left .48s cubic-bezier(.22,.8,.22,1), top .48s cubic-bezier(.22,.8,.22,1), width .48s cubic-bezier(.22,.8,.22,1), transform .48s cubic-bezier(.22,.8,.22,1), opacity .32s ease";
      metaClone.style.left=`${titleRect.left}px`;
      metaClone.style.top=`${titleRect.top}px`;
      metaClone.style.width=`${titleRect.width}px`;
      metaClone.style.textAlign="left";
      const chapterEl=metaClone.querySelector(".chapter");
      const titleEl=metaClone.querySelector(".title");
      if(chapterEl)chapterEl.style.fontSize="22px";
      if(titleEl)titleEl.style.fontSize="20px";
    }
  }));

  setTimeout(()=>{
    target.classList.remove("is-hidden");
    titleTarget.classList.remove("is-hidden");

    requestAnimationFrame(()=>{
      bookClone.style.opacity="0";
      if(metaClone)metaClone.style.opacity="0";

      setTimeout(()=>{
        bookClone.remove();
        metaClone?.remove();
        journalOpenRect=null;
        journalMetaRect=null;
        journalBookAnimating=false;
      },120);
    });
  },470);
}


function exitInstructionsThenHome(showSaved=false){

function returnHomeWithBookAnimation(showSaved=false){
  if(journalBookAnimating)return;
  const source=document.querySelector(".journal-cover-mini");
  const titleSource=document.querySelector(".journal-title-copy");
  if(!source||!titleSource){
    state.view="home";
    save();
    render();
    if(showSaved)showToast();
    return;
  }

  journalBookAnimating=true;
  const sourceRect=source.getBoundingClientRect();
  const titleSourceRect=titleSource.getBoundingClientRect();
  const j=currentJournal();

  source.classList.add("is-hidden");
  titleSource.classList.add("is-hidden");

  const bookClone=createJournalTransitionBook(state.patterns[j.id],sourceRect);
  const bookInner=bookClone.querySelector(".journal-transition-pattern");
  const miniPattern=source.querySelector(".journal-cover-pattern");
  if(miniPattern){
    bookInner.style.width="180px";
    bookInner.style.height="270px";
    bookInner.style.transform=`scale(${sourceRect.width/180},${sourceRect.height/270})`;
  }

  const metaClone=createJournalTransitionMeta(titleSourceRect,j.chapter,j.title);
  metaClone.style.textAlign="left";
  metaClone.querySelector(".chapter").style.fontSize="22px";
  metaClone.querySelector(".title").style.fontSize="20px";

  state.view="home";
  save();
  render();
  window.scrollTo(0,0);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const target=document.querySelector(`.book-slot[data-index="${state.currentIndex}"] .book`);
    const metaTarget=document.querySelector(".meta");
    if(!target||!metaTarget){
      bookClone.remove();
      metaClone.remove();
      journalBookAnimating=false;
      if(showSaved)showToast();
      return;
    }

    target.classList.add("transition-target-hidden");
    metaTarget.style.opacity="0";

    const targetRect=target.getBoundingClientRect();
    const metaTargetRect=metaTarget.getBoundingClientRect();

    bookClone.style.transition="left .48s cubic-bezier(.22,.8,.22,1), top .48s cubic-bezier(.22,.8,.22,1), width .48s cubic-bezier(.22,.8,.22,1), height .48s cubic-bezier(.22,.8,.22,1), border-radius .48s ease, opacity .12s ease";
    bookInner.style.transition="transform .48s cubic-bezier(.22,.8,.22,1)";
    bookClone.style.left=`${targetRect.left}px`;
    bookClone.style.top=`${targetRect.top}px`;
    bookClone.style.width=`${targetRect.width}px`;
    bookClone.style.height=`${targetRect.height}px`;
    bookClone.style.borderRadius="2px 6px 6px 2px";
    bookInner.style.transform="scale(1,1)";

    metaClone.style.transition="left .48s cubic-bezier(.22,.8,.22,1), top .48s cubic-bezier(.22,.8,.22,1), width .48s cubic-bezier(.22,.8,.22,1), opacity .32s ease";
    metaClone.style.left=`${metaTargetRect.left}px`;
    metaClone.style.top=`${metaTargetRect.top}px`;
    metaClone.style.width=`${metaTargetRect.width}px`;
    metaClone.style.textAlign="center";
    metaClone.querySelector(".chapter").style.fontSize="18px";
    metaClone.querySelector(".title").style.fontSize="18px";

    setTimeout(()=>{
      target.classList.remove("transition-target-hidden");
      metaTarget.style.opacity="";

      requestAnimationFrame(()=>{
        bookClone.style.opacity="0";
        metaClone.style.opacity="0";

        setTimeout(()=>{
          bookClone.remove();
          metaClone.remove();
          journalBookAnimating=false;
          if(showSaved)showToast();
        },120);
      });
    },470);
  }));
}

function openJournal(index,bookElement=null){
  if(journalBookAnimating)return;
  state.currentIndex=index;
  if(bookElement){
    const rect=bookElement.getBoundingClientRect();
    const meta=document.querySelector(".meta");
    const metaRect=meta?.getBoundingClientRect();
    journalOpenRect={left:rect.left,top:rect.top,width:rect.width,height:rect.height};
    journalMetaRect=metaRect?{left:metaRect.left,top:metaRect.top,width:metaRect.width,height:metaRect.height}:null;
    journalBookAnimating=true;
  }
  state.view=state.journals[JOURNALS[index].id].introSeen?"entry":"intro";
  save();
  render();
  window.scrollTo(0,0);
  if(journalOpenRect)requestAnimationFrame(animateBookToJournal);
}

function renderCoverEdit(){
  const j=currentJournal(),sec=sectionFor(j.section);
  main.innerHTML=`<section class="cover-edit">
    <h1>${esc(sec.name)}</h1>
    <div class="edit-book-large pattern-${draftPattern}" id="editBookLarge"
      style="left:${editBookRect?.left ?? 0}px;top:${editBookRect?.top ?? 0}px;width:${editBookRect?.width ?? 180}px;height:${editBookRect?.height ?? 270}px"></div>

          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5l-7 7 7 7"></path></svg>
        </button>
        <button class="small-round" id="patNext" aria-label="Next patterns">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7"></path></svg>
        </button>
      </div>
      <div class="pattern-strip" id="patternStrip">
        ${availablePatternNumbers.map(n=>`<button class="pattern-thumb ${n===draftPattern?"selected":""}" data-pattern="${n}" aria-label="Pattern ${n}"><span class="pattern-${n}"></span></button>`).join("")}
      </div>
      <div class="edit-actions">
        <button class="cancel-edit action-draw" id="cancelEdit" aria-label="Cancel">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path class="draw-stroke" d="M6 6l12 12"></path>
            <path class="draw-stroke draw-delay" d="M18 6L6 18"></path>
          </svg>
        </button>
        <button class="save-edit action-draw" id="saveEdit" aria-label="Save pattern">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path class="draw-stroke check-stroke" d="M5 12.5l4.3 4.3L19 7"></path>
          </svg>
        </button>
      </div>
    </div>
  </section>`;
  const strip=document.getElementById("patternStrip");
  const patPrev=document.getElementById("patPrev");
  const patNext=document.getElementById("patNext");

  const updatePatternArrows=()=>{
    const maxScroll=strip.scrollWidth-strip.clientWidth;
    patPrev.disabled=strip.scrollLeft<=2;
    patNext.disabled=strip.scrollLeft>=maxScroll-2;
  };

  const scrollSelectedPatternIntoView=()=>{
    const selected=strip.querySelector(`[data-pattern="${draftPattern}"]`);
    if(!selected)return;
    const targetLeft=selected.offsetLeft-(strip.clientWidth-selected.offsetWidth)/2;
    strip.scrollTo({
      left:Math.max(0,targetLeft),
      behavior:"auto"
    });
    requestAnimationFrame(updatePatternArrows);
  };

  strip.querySelectorAll("[data-pattern]").forEach(b=>b.onclick=()=>{
    draftPattern=+b.dataset.pattern;document.getElementById("editBookLarge").className=`edit-book-large pattern-${draftPattern}`;
    strip.querySelectorAll("[data-pattern]").forEach(x=>x.classList.toggle("selected",+x.dataset.pattern===draftPattern))
  });
  patPrev.onclick=()=>strip.scrollBy({left:-230,behavior:"smooth"});
  patNext.onclick=()=>strip.scrollBy({left:230,behavior:"smooth"});
  strip.addEventListener("scroll",updatePatternArrows,{passive:true});
  requestAnimationFrame(()=>requestAnimationFrame(scrollSelectedPatternIntoView));
  document.getElementById("cancelEdit").onclick=()=>leaveCoverEdit(false);
  document.getElementById("saveEdit").onclick=()=>{
    if(editClosing)return;
    const saveButton=document.getElementById("saveEdit");
    const panel=document.querySelector(".pattern-drawer");
    saveButton.classList.add("saving");
    panel?.classList.add("save-confirmed");
    setTimeout(()=>leaveCoverEdit(true),560);
  }
}

  const content=document.querySelector(".journal-content");

    content.classList.add(exitClass);
    setTimeout(()=>{
      state.view=targetView;
      journalTransition=direction;
      save();
      render();
      window.scrollTo(0,0);
    },210);

    state.view=targetView;

    save();
    render();
    window.scrollTo(0,0);
  }
}

function openSourceModal(id=null){

  modal.className="modal";
  modal.innerHTML=`<button class="modal-close close-icon" data-close aria-label="Close">

    let valid=false;
    try{

    sourceSaveButton.disabled=!(valid&&note);
    if(valid&&note)document.getElementById("sourceError").classList.add("hidden");
  };

  sourceUrlInput.addEventListener("input",sourceFormReady);
  sourceNoteInput.addEventListener("input",sourceFormReady);
  sourceFormReady();

  sourceSaveButton.onclick=()=>{
    const url=sourceUrlInput.value.trim(),note=sourceNoteInput.value.trim();
    let valid=false;try{const u=new URL(url);valid=["http:","https:"].includes(u.protocol)}catch{}
    if(!valid||!note){document.getElementById("sourceError").classList.remove("hidden");return}

    sourceSaveButton.classList.add("confirm-saving");

    let title="Website";
    try{title=new URL(url).hostname.replace(/^www\./,"")}catch{}
    if(existing)Object.assign(existing,{url,note,title});else js.sources.push({id:crypto.randomUUID?.()||String(Date.now()),url,note,title});
    touch(js);

    setTimeout(()=>{
      closeModal();
      renderEntry();
    },560);
  }
}

function launchDownloadConfetti(){
  const container=document.getElementById("downloadConfetti");
  if(!container)return;

  container.innerHTML="";
  const colors=["#111","#f04e23","#f8c95a","#2c87b7","#78a99d","#d94434"];
  const count=30;

  for(let i=0;i<count;i++){
    const piece=document.createElement("span");
    piece.className="download-confetti-piece";

    const angle=(-160+Math.random()*140)*(Math.PI/180);
    const distance=58+Math.random()*82;
    const x=Math.cos(angle)*distance;
    const y=Math.sin(angle)*distance;

    piece.style.setProperty("--confetti-x",`${x.toFixed(1)}px`);
    piece.style.setProperty("--confetti-y",`${y.toFixed(1)}px`);
    piece.style.setProperty("--confetti-r",`${Math.round(Math.random()*600-300)}deg`);
    piece.style.setProperty("--confetti-delay",`${Math.round(Math.random()*90)}ms`);
    piece.style.setProperty("--confetti-color",colors[i%colors.length]);

    if(i%3===0){
      piece.style.width="5px";
      piece.style.height="5px";
      piece.style.borderRadius="50%";
    }else if(i%3===1){
      piece.style.width="9px";
      piece.style.height="3px";
    }

    container.appendChild(piece);
  }

  setTimeout(()=>{container.innerHTML=""},1250);
}

function searchTextForJournal(j){
  return [
    `Chapter ${j.chapter}`,
    j.title,
    sectionFor(j.section)?.name||""
  ].join(" ");
}

function escRegExp(value){
  return value.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
}

function highlightSearchText(value,query){
  return esc(String(value||""));
}

function journalSearchSnippet(j,query){
  return sectionFor(j.section)?.name||`Chapter ${j.chapter}`;
}

function searchFilterIndex(filter){
  return filter==="all"?0:filter==="not-completed"?1:2;
}

function ensureSearchResultsShell(){
  if(navSearchResults.querySelector(".nav-search-results-inner"))return;

  navSearchResults.innerHTML=`
    <div class="nav-search-results-inner">
      <div class="search-filter" aria-label="Filter search results">
        <div class="search-filter-control" style="--filter-index:${searchFilterIndex(searchFilter)}">
          <button class="search-filter-btn active" data-search-filter="all" aria-pressed="true">All</button>
          <button class="search-filter-btn" data-search-filter="not-completed" aria-pressed="false">Not completed</button>
          <button class="search-filter-btn" data-search-filter="completed" aria-pressed="false">Completed</button>
          <span class="search-filter-indicator" aria-hidden="true"></span>
        </div>
      </div>
      <div class="search-results-content"></div>
    </div>`;

  const control=navSearchResults.querySelector(".search-filter-control");
  control.querySelectorAll("[data-search-filter]").forEach(button=>{
    button.onclick=()=>{
      const next=button.dataset.searchFilter;
      if(next===searchFilter)return;

      searchFilter=next;
      control.style.setProperty("--filter-index",searchFilterIndex(searchFilter));

      control.querySelectorAll("[data-search-filter]").forEach(tab=>{
        const selected=tab.dataset.searchFilter===searchFilter;
        tab.classList.toggle("active",selected);
        tab.setAttribute("aria-pressed",String(selected));
      });

      updateSearchResultList();
    };
  });
}

function updateSearchResultList(){
  ensureSearchResultsShell();

  const list=navSearchResults.querySelector(".search-results-content");
  const query=journalSearchInput.value.trim();

  const matchesStatus=journal=>{
    const complete=Boolean(state.journals[journal.id].complete);
    if(searchFilter==="completed")return complete;
    if(searchFilter==="not-completed")return !complete;
    return true;
  };

  if(!query){
    const filtered=JOURNALS.filter(matchesStatus);

    if(!filtered.length){
      list.innerHTML=`<div class="search-empty">${
        searchFilter==="completed"
          ?"No journals have been completed yet."
          :searchFilter==="not-completed"
            ?"All journals are complete."
            :"There are no journals to show."
      }</div>`;
      return;
    }

    list.innerHTML=`<div class="search-empty">Start typing to search journals within ${
      searchFilter==="completed"?"completed journals":
      searchFilter==="not-completed"?"not completed journals":
      "all journals"
    }.</div>`;
    return;
  }

  const terms=query.toLowerCase().split(/\s+/).filter(Boolean);
  const matches=JOURNALS.map((journal,index)=>{
    const haystack=searchTextForJournal(journal).toLowerCase();
    const score=terms.reduce((total,term)=>total+(haystack.includes(term)?1:0),0);
    return {journal,index,score};
  }).filter(item=>item.score>0&&matchesStatus(item.journal))
    .sort((a,b)=>b.score-a.score||a.index-b.index);

  if(!matches.length){
    list.innerHTML=`<div class="search-empty">${
      searchFilter==="completed"
        ?`No completed journals matched “${esc(query)}.”`
        :searchFilter==="not-completed"
          ?`No not completed journals matched “${esc(query)}.”`
          :`No journals matched “${esc(query)}.”`
    }</div>`;
    return;
  }

  list.innerHTML=`
    <div class="search-count">${matches.length} result${matches.length===1?"":"s"}</div>
    ${matches.map(({journal,index})=>{
      const js=state.journals[journal.id];
      const snippet=journalSearchSnippet(journal,query);
      return `<button class="search-result" data-search-go="${index}">
        <span class="search-result-book" aria-hidden="true">
          <span class="search-result-book-pattern pattern-${state.patterns[journal.id]}"></span>
        </span>
        <span class="search-result-copy">
          <span class="search-result-title">${highlightSearchText(journal.title,query)}</span>
          <span class="search-result-match">${highlightSearchText(snippet,query)}</span>
        </span>
        <span class="search-result-status ${status(js)}" aria-label="${status(js)}"></span>
      </button>`;
    }).join("")}`;

  list.querySelectorAll("[data-search-go]").forEach(button=>{
    button.onclick=()=>{
      const index=+button.dataset.searchGo;
      closeNavSearch();
      closeDrawer();
      state.currentIndex=index;
      state.view=state.journals[JOURNALS[index].id].introSeen?"entry":"intro";
      save();render();window.scrollTo(0,0);
    };
  });
}

function renderNavSearchResults(){
  ensureSearchResultsShell();
  updateSearchResultList();
  navSearchResults.classList.add("open");
}

function openNavSearch(){
  navSearch.classList.add("open");
  searchBtn.setAttribute("aria-expanded","true");
  renderNavSearchResults();
  requestAnimationFrame(()=>journalSearchInput.focus());
}

function closeNavSearch(){
  navSearch.classList.remove("open");
  searchBtn.setAttribute("aria-expanded","false");
  navSearchResults.classList.remove("open");
  journalSearchInput.value="";
  setTimeout(()=>{
    if(!navSearchResults.classList.contains("open"))navSearchResults.innerHTML="";
  },280);
}

function openModal(){
  modalLayer.classList.remove("closing");
  modalLayer.classList.add("open");
  modalLayer.setAttribute("aria-hidden","false");
  modal.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
}
function closeModal(){
  if(!modalLayer.classList.contains("open")||modalLayer.classList.contains("closing"))return;

  modalLayer.classList.add("closing");
  modalLayer.setAttribute("aria-hidden","true");

  setTimeout(()=>{
    modalLayer.classList.remove("closing","open");
    modal.innerHTML="";
    modal.className="modal";
  },380);
}
